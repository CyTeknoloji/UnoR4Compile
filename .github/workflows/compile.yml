name: UNO R4 Bulut Derleyici

on:
  workflow_dispatch:
    inputs:
      sketch_code:
        description: 'Kod'
        required: true
      libraries:
        description: 'Kutuphaneler (virgulle)'
        required: false
      library_files:
        description: 'Uygulamadan zip kutuphaneler (JSON)'
        required: false
      board_type:
        description: 'Kart modeli (FQBN)'
        required: true
        default: 'arduino:renesas_uno:unor4wifi'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arduino CLI Kur
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Renesas UNO R4 onbellegi
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: ${{ runner.os }}-renesas-uno-v2

      - name: Cekirdek ve kutuphaneleri hazirla
        env:
          LIBS: ${{ github.event.inputs.libraries }}
        run: |
          CLI=./bin/arduino-cli
          $CLI core update-index
          $CLI core install arduino:renesas_uno@1.6.0

          install_one() {
            local trim_lib="$1"
            [ -z "$trim_lib" ] && return 0
            $CLI lib install "$trim_lib" || true
          }

          if [ -n "${LIBS:-}" ]; then
            echo "$LIBS" | tr ',' '\n' | while IFS= read -r lib; do
              install_one "$(echo "$lib" | xargs)"
            done
          fi

      - name: Uygulamadan gelen kutuphane zip dosyalari
        env:
          LIBRARY_FILES: ${{ github.event.inputs.library_files }}
        run: |
          python3 scripts/install_library_files.py

      - name: Sketch hazirla
        shell: python
        env:
          SKETCH_INPUT: ${{ github.event.inputs.sketch_code }}
        run: |
          import os
          content = os.environ.get("SKETCH_INPUT", "")
          os.makedirs("MySketch", exist_ok=True)
          with open("MySketch/MySketch.ino", "w", encoding="utf-8") as f:
              f.write(content)

      - name: Derle
        run: |
          mkdir -p output
          ./bin/arduino-cli compile --fqbn "${{ github.event.inputs.board_type }}" MySketch --output-dir ./output

      - name: BIN yayinla
        uses: actions/upload-artifact@v4
        with:
          name: unor4_build
          path: output/*.bin
          if-no-files-found: error
